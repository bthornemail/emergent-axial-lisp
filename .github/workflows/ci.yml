name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.4.7"
          cabal-version: "3.8.1.0"
      - run: cabal build all
      - run: cabal test all
